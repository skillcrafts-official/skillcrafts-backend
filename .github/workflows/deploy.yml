# Название workflow (отображается в GitHub UI)
name: Docker Build and Push

# Когда запускать workflow
on:
  # 1. При пуше в ветку main
  push:
    branches: 
      - main
  
env:
  # Константы
  REGISTRY: ghcr.io
  DOCKERFILE_PATH: ./Dockerfile
  PLATFORMS: linux/amd64,linux/arm64
  # Динамические переменные на основе контекста
  IMAGE_NAME: ${{ github.repository }}

# Jobs - основные задачи workflow
jobs:
  build:
    # Где запускать
    runs-on: ubuntu-latest  # или ubuntu-22.04, windows-latest, macos-latest
    # Разрешения (особенно для GitHub Packages)
    permissions:
      contents: read      # Чтение кода
      packages: write     # ОБЯЗАТЕЛЬНО: запись в GitHub Packages
      id-token: write     # Для OIDC аутентификации (рекомендуется)

    # Шаги выполнения
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container  # Использует контейнер для сборки

      - name: Extract Docker metadata
        id: meta  # Важно: даём ID для обращения к output
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=   # Используем хэш коммита как тег
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Вариант A: GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}          # Имя пользователя GitHub
          password: ${{ secrets.GITHUB_TOKEN }}  # Автоматический токен
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .  # Директория с Dockerfile
          file: ./Dockerfile.prod  # Путь к Dockerfile
          platforms: linux/amd64,linux/arm64  # Multi-arch сборка
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
    
          # Кэширование для ускорения
          cache-from: type=gha  # Кэш из GitHub Actions
          cache-to: type=gha,mode=max
      
          # Build arguments (переменные сборки)
          build-args: |
            BUILD_DATE=${{ github.event.created_at }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}

  test:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    services:
      postgres:
        image: postgres:15          # или ваша версия
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout code (нужны тесты из репозитория)
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run tests inside container
        id: tests
        env:
          DATABASE_URL: postgres://test_user:test_password@postgres:5432/test_db
        run: |
          mkdir -p allure-results
          docker run --rm \
            --network ${{ job.services.postgres.network }} \   # важно, чтобы контейнер видел сервис
            -e DATABASE_URL="$DATABASE_URL" \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_NAME=test_db \
            -e DB_USER=test_user \
            -e DB_PASSWORD=test_password \
            -v ${{ github.workspace }}/allure-results:/app/allure-results \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            sh -c "python manage.py migrate --noinput && pytest --alluredir=/app/allure-results"
        continue-on-error: true   # чтобы даже при падении тестов мы сохранили артефакт

      - name: Upload allure-results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Send results to Allure server
        if: always()   # отправляем в любом случае – отчёт о падении тоже полезен
        env:
          ALLURE_SERVER_URL: ${{ secrets.ALLURE_SERVER_URL }}
          ALLURE_USER: ${{ secrets.ALLURE_USER }}
          ALLURE_PASSWORD: ${{ secrets.ALLURE_PASSWORD }}
          ALLURE_PROJECT_ID: 'default'
        run: |
          # Упаковываем результаты в zip
          cd allure-results
          zip -r ../allure-results.zip .
          cd ..
          # Отправляем через API allure-docker-service
          # Подробнее: https://github.com/fescobar/allure-docker-service#send-results
          curl -X POST "$ALLURE_SERVER_URL/api/result" \
               -u "$ALLURE_USER:$ALLURE_PASSWORD" \
               -H "accept: */*" \
               -H "Content-Type: multipart/form-data" \
               -F "file=@allure-results.zip;type=application/zip" \
               -F "project_id=$ALLURE_PROJECT_ID"

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [build, test]
    if: ${{ needs.build.result == 'success' && needs.test.result == 'success' }}
    # if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'production'
    
    steps:
      - name: Deploy to production
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          HOST: ${{ secrets.SERVER_HOST }}
          USER: ${{ secrets.SERVER_USER }}
          IMAGE_FULL: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          echo "$SSH_PRIVATE_KEY" > private_key
          chmod 600 private_key
          
          ssh -o StrictHostKeyChecking=no -i private_key \
            ${USER}@${HOST} "
            # Команды для деплоя на сервере
            cd /opt/drf_blog_api/
            echo 'IMAGE_NAME=$IMAGE_FULL' > .env.docker
            git pull origin main
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            docker-compose -f docker-compose.prod.yml stop web 2>/dev/null || true
            docker-compose -f docker-compose.prod.yml rm -f web 2>/dev/null || true
            docker-compose -f docker-compose.prod.yml --env-file .env.docker up -d web
            docker system prune -f
          "
